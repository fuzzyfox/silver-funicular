<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Google Gemini placeholder logo -->
  <!-- Replace with official Google Gemini logo -->

  <!-- Background gradient matching Google colors -->
  <defs>
    <linearGradient id="geminiGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#EA4335;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBC04;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="geminiGradient2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34A853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4285F4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main circle background -->
  <circle cx="32" cy="32" r="30" fill="url(#geminiGradient1)"/>

  <!-- Star/sparkle representation for Gemini AI -->
  <g transform="translate(32, 32)">
    <!-- Top star point -->
    <path d="M 0,-18 L 2,-6 L 0,-6 L -2,-6 Z" fill="white"/>
    <!-- Right star point -->
    <path d="M 18,0 L 6,2 L 6,0 L 6,-2 Z" fill="white"/>
    <!-- Bottom star point -->
    <path d="M 0,18 L -2,6 L 0,6 L 2,6 Z" fill="white"/>
    <!-- Left star point -->
    <path d="M -18,0 L -6,-2 L -6,0 L -6,2 Z" fill="white"/>

    <!-- Center circle -->
    <circle cx="0" cy="0" r="6" fill="white"/>
    <circle cx="0" cy="0" r="4" fill="url(#geminiGradient2)"/>
  </g>

  <!-- Small decorative stars -->
  <circle cx="16" cy="16" r="2" fill="white" opacity="0.8"/>
  <circle cx="48" cy="16" r="2" fill="white" opacity="0.8"/>
  <circle cx="16" cy="48" r="2" fill="white" opacity="0.8"/>
  <circle cx="48" cy="48" r="2" fill="white" opacity="0.8"/>
</svg>
